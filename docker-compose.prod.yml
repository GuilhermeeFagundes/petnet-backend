services:
  db:
    image: mysql:8.4
    container_name: netcao-db-prod
    env_file:
      - .env.prod
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data_prod:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: netcao-api-prod
    restart: unless-stopped
    ports:
      - "3000:3000"        # ← Traefik acessa via host network
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: "mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}"
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netcao-api.rule=Host(`api.netcao.com.br`)"
      - "traefik.http.routers.netcao-api.entrypoints=websecure"
      - "traefik.http.routers.netcao-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.netcao-api.loadbalancer.server.port=3000"
    networks:
      - internal

volumes:
  db_data_prod:

networks:
  internal:
    driver: bridge