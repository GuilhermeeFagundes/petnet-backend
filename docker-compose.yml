services:
  db:
    image: mysql:8.4
    container_name: netcao-db
    ports:
      - "5678:3306"
    environment:
      # Restrito a localhost — root não aceita conexões externas
      MYSQL_ROOT_HOST: "localhost"
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netcao-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env  # Carrega JWT_SECRET, JWT_EXPIRES_IN, DB_* e demais variáveis locais
    environment:
      DATABASE_URL: "mysql://root:${DB_PASSWORD}@db:3306/${DB_NAME}"
      PORT: 3000
      NODE_ENV: development
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: prisma/schema.prisma

volumes:
  db_data:
